        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/ScrollTrigger.min.js"></script>
        <script type="text/javascript">
            gsap.registerPlugin(ScrollTrigger);

            function smoothScroll(scrollContent, scrollWrap, smoothness) {
                scrollContent = gsap.utils.toArray(scrollContent)[0];
                smoothness = smoothness || 1;

                gsap.set(scrollWrap || scrollContent.parentNode, {
                    overflow: "hidden",
                    position: "fixed",
                    width: "100%",
                    height: "100%",
                    top: 0,
                    left: 0,
                    right: 0,
                    bottom: 0,
                });
                gsap.set(scrollContent, {
                    overflow: "visible",
                    width: "100%",
                });

                let getProp = gsap.getProperty(scrollContent),
                    setProp = gsap.quickSetter(scrollContent, "y", "px"),
                    setScroll = ScrollTrigger.getScrollFunc(window),
                    removeScroll = function () {
                        return (scrollContent.style.overflow = "visible");
                    },
                    killScrub = function (trigger) {
                        let scrub = trigger.getTween
                            ? trigger.getTween()
                            : gsap.getTweensOf(trigger.animation)[0];
                        scrub && scrub.kill();
                        trigger.animation.progress(trigger.progress);
                    },
                    height,
                    isProxyScrolling;

                function refreshHeight() {
                    height = scrollContent.clientHeight;
                    scrollContent.style.overflow = "visible";
                    document.body.style.height = height + "px";
                    return height - document.documentElement.clientHeight;
                }

                ScrollTrigger.addEventListener("refresh", function () {
                    removeScroll();
                    requestAnimationFrame(removeScroll);
                });
                ScrollTrigger.defaults({
                    scroller: scrollContent,
                });
                ScrollTrigger.prototype.update = function (p) {
                    return p;
                };

                ScrollTrigger.scrollerProxy(scrollContent, {
                    scrollTop: function (value) {
                        if (arguments.length) {
                            isProxyScrolling = true;
                            setProp(-value);
                            setScroll(value);
                            return;
                        }
                        return -getProp("y");
                    },
                    getBoundingClientRect: function () {
                        return {
                            top: 0,
                            left: 0,
                            width: window.innerWidth,
                            height: window.innerHeight,
                        };
                    },
                });

                return ScrollTrigger.create({
                    animation: gsap.fromTo(
                        scrollContent,
                        {
                            y: 0,
                        },
                        {
                            y: function () {
                                return (
                                    document.documentElement.clientHeight -
                                    height
                                );
                            },
                            ease: "none",
                            onUpdate: ScrollTrigger.update,
                        }
                    ),
                    scroller: window,
                    invalidateOnRefresh: true,
                    start: 0,
                    end: refreshHeight,
                    refreshPriority: -999,
                    scrub: smoothness,
                    onUpdate: function (self) {
                        if (isProxyScrolling) {
                            killScrub(self);
                            isProxyScrolling = false;
                        }
                    },
                    onRefresh: killScrub,
                });
            }

            gsap.registerPlugin(ScrollTrigger);
            ScrollTrigger.saveStyles(".mobile, .desktop");
            var pinDistance = 1000;
            var targets = $(".partner .img"),
                pinDistance = targets.outerHeight() * targets.length;

            smoothScroll("#scrollContent");
            gsap.set(".partner", { autoAlpha: 1 });

            const timeline = gsap.timeline({
                defaults: {
                    overwrite: "auto",
                },
                scrollTrigger: {
                    pin: true,
                    scrub: true,
                    start: "top top",
                    end: "+=" + pinDistance,
                    trigger: ".partnerBox",
                },
            });

            const stagger = 0.8;
            const duration = 1;

            gsap.set(".partner", { autoAlpha: 1 });

            timeline
                .from(targets, {
                    duration: duration,
                    stagger: stagger,
                    y: "-40",
                    opacity: 0,
                    duration: 0.8,
                    overwrite: true,
                })
                .to(
                    targets,
                    {
                        duration: duration,
                        stagger: stagger,
                        y: "0",
                        opacity: 1,
                        duration: 0.8,
                        delay: 0.4,
                        overwrite: true,
                    },
                    stagger
                );
        </script>
