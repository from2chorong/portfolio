<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>test</title>
        <link rel="stylesheet" type="text/css" href="/css/index.css" />
    </head>
    <body>
        <article class="scroll-wrap">
            <div class="cursor-box">
                <svg class="cursor-line"></svg>
                <div class="cursor-pointer"></div>
            </div>
            <div class="scroll-container">
                <div class="flex-box">
                    <div class="blurCircle"></div>
                    <div class="cont"></div>
                    <div class="cont"></div>
                    <div class="cursor-scale"></div>
                    <div class="cont"></div>
                    <div class="cont"></div>
                    <div class="cont"></div>
                    <div class="cursor-scale"></div>
                    <div class="cont"></div>
                    <div class="cursor-scale small">small</div>
                    <div class="cont"></div>
                    <div class="cont"></div>
                </div>
            </div>
        </article>

        <script src="http://code.jquery.com/jquery-latest.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.4.0/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.4.0/ScrollTrigger.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.4.0/ScrollToPlugin.min.js"></script>
        <script src="/js/smoothScroll.js"></script>
        <script src="/js/cursor.js"></script>
        <script src="/js/index.js"></script>
        <script>
            const multiple = 40;
            const mouseOverContainer = document.getElementsByTagName("body")[0];
            const elements = document.querySelectorAll(".cont");

            function transformElement(element, x, y) {
                let box = element.getBoundingClientRect();
                let calcX = -(y - box.y - box.height / 2) / multiple;
                let calcY = (x - box.x - box.width / 2) / multiple;

                element.style.transform =
                    "rotateX(" + calcX + "deg) " + "rotateY(" + calcY + "deg)";
            }

            function resetTransform(element) {
                element.style.transform = "rotateX(0) rotateY(0)";
            }

            elements.forEach((element) => {
                element.addEventListener("mousemove", (e) => {
                    window.requestAnimationFrame(function () {
                        transformElement(element, e.clientX, e.clientY);
                    });
                });

                element.addEventListener("mouseleave", (e) => {
                    window.requestAnimationFrame(function () {
                        resetTransform(element);
                    });
                });
            });
        </script>
    </body>
</html>
