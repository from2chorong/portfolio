<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" type="text/css" href="/css/style.css" />

        <style>
            html,
            body {
                height: 100%;
                background: #040507;
            }
			* {
				box-sizing: border-box;
			}

            body {
                font-size: 18px;
                font-weight: 500;
            }

            .panel {
                position: fixed;
                width: 100vw;
                height: 100vh;
                top: 0;
                left: 0;
				border: 20px solid blue;
                background: linear-gradient(107.15deg, #040507 0, #263b63 100%);
            }

            .panel:nth-of-type(2n) {
				border: 20px solid red;
                background: linear-gradient(107.15deg, #263b63 0, #040507 100%);
            }

            .panel .fixed-container {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }

            h1,
            p,
            a {
                color: #fff !important;
                text-align: center;
            }

            .active {
                color: red !important;
            }

            section:not(.intro) {
                opacity: 0;
                visibility: hidden;
                transform: translateY(100%);
            }
        </style>
    </head>
    <body>
        <article class="scroll-wrap dark">
            <div class="cursor-box">
                <svg class="cursor-line"></svg>
                <div class="cursor-pointer"></div>
            </div>
            <div class="scroll-container">
                <div class="slides-wrapper">
                    <section id="intro" class="intro panel">
                        <div class="fixed-container">
                            <h1>Intro Slide</h1>
                        </div>
                    </section>
                    <section id="one" class="first panel">
                        <div class="fixed-container">
                            <h1>Section 1</h1>
                            <p>Additional element</p>
                        </div>
                    </section>
                    <section id="two" class="second panel">
                        <div class="fixed-container">
                            <h1>Section 2</h1>
                        </div>
                    </section>
                    <section id="three" class="third panel">
                        <div class="fixed-container">
                            <h1>Section 3</h1>
                        </div>
                    </section>
                    <section id="four" class="fouth panel">
                        <div class="fixed-container">
                            <h1>Section 4</h1>
                        </div>
                    </section>
                </div>
            </div>
        </article>

		<script defer src="/js/customCursor.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/ScrollTrigger.min.js"></script>
        <script>

            let sections = gsap.utils.toArray("section"),
                currentSection = sections[0];

            gsap.set("body", { height: sections.length * 100 + "%" });

            sections.forEach((section, i) => {
                ScrollTrigger.create({
                    pinned: true,
                    start: () => (i - 0.1) * innerHeight,
                    end: () => (i + 0.2) * innerHeight,
                    onToggle: (self) => self.isActive && setSection(section),
                });
            });

            function setSection(newSection) {
                if (newSection !== currentSection) {
                    var tl = gsap.timeline({
                        defaults: {
                            duration: 0.5,
                            overwrite: "auto",
                        },
                    });
                    tl.to(newSection, { yPercent: 0, autoAlpha: 1 })
                        .to(currentSection, { yPercent: 100, autoAlpha: 0 }, "<")
                        .from(
                            newSection.querySelector("h1"),
                            { autoAlpha: 0, y: 50 },
                            "<"
                        )
                        .from(
                            newSection.querySelector("p"),
                            { autoAlpha: 0, y: 20 },
                            ">"
                        );

                    currentSection = newSection;
                }
            }
            ScrollTrigger.create({
                start: 1,
            }).scroll(2);

            // manual anchor tags effect

            let offsetPositions = [];
            let container = document.querySelector("section");
            let containerWidth = container.offsetHeight;
        </script>
    </body>
</html>
